name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest,  r: 'release' }
          - { os: ubuntu-latest,  r: 'oldrel-1' }
          - { os: macos-latest,   r: 'release' }
          - { os: windows-latest, r: 'release' }
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v7

      # Without an explicit MACOSX_DEPLOYMENT_TARGET, the Rust build (cc crate,
      # e.g. psm's aarch_aapcs64.s) targets the SDK version (e.g. 26.5) while
      # R's final link uses clang's default (e.g. 26.0). ld then warns
      # "object file was built for newer 'macOS' version than being linked",
      # which R CMD check reports as a WARNING and fails the check.
      # Pinning the deployment target to the runner's OS version keeps the
      # Rust objects and the link step consistent.
      - name: Align macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=$(sw_vers -productVersion)" >> "$GITHUB_ENV"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Windows GNU target
        if: runner.os == 'Windows'
        run: rustup target add x86_64-pc-windows-gnu

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src/rust/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual", "--compact-vignettes=gs+qpdf")'
